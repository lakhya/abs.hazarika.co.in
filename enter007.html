<!DOCTYPE html>
<html>
<head>
<title>User Form</title>
</head>

<body>

<h2>User Registration 1</h2>

<label>Name</label><br>
<input id="name"><br><br>

<label>Mobile</label><br>
<input id="mobile"><br><br>

<label>City</label><br>
<input id="city"><br><br>

<button onclick="submitForm()">Submit</button>

<script>

function submitForm(){

const data = {
 name: document.getElementById("name").value,
 mobile: document.getElementById("mobile").value,
 city: document.getElementById("city").value
};

fetch("https://script.google.com/macros/s/AKfycbwQ3609JjeJRoyuswNbLhzoV3BBQsY0mf_5s1D7NCYJjT-DGCvg3nEvn-gOkgMvAu9e/exec",{
 method:"POST",
 headers:{
  "Content-Type":"application/json"
 },
 body: JSON.stringify(data)
})
.then(res=>res.text())
.then(msg=>{
 alert("Data saved successfully");
});

}

</script>

</body>
</html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>404 - Page Not Found</title><style>body{margin:0;font-family:Arial,sans-serif;height:100vh;background:linear-gradient(135deg,#0169CC,#0b3c7a);color:#fff;overflow:hidden}#center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:4;width:90vw;max-width:600px}#loader,#rebootLoader{font-family:monospace}#loaderText{font-size:22px;letter-spacing:2px;margin-bottom:15px}.progress-bar{width:260px;max-width:80vw;height:6px;background:rgba(255,255,255,.2);overflow:hidden;border-radius:3px;margin:auto}#progress,#progress2{height:100%;width:0;background:#fff}.container{text-align:center;animation:fade 1.5s ease;display:none}h1{font-size:clamp(80px,15vw,180px);margin:0;letter-spacing:5px}h2{margin-top:-10px;font-size:clamp(20px,3vw,32px);opacity:.9}p{opacity:.8;margin-top:10px}.btn{display:inline-block;margin-top:25px;padding:14px 30px;background:#fff;color:#0169CC;font-weight:700;border-radius:30px;text-decoration:none;cursor:pointer}.circle{position:absolute;border-radius:50%;background:rgba(255,255,255,.08);animation:float 20s ease-in-out infinite;opacity:0;transition:opacity 1s}.circle.show{opacity:1}.circle:nth-child(5){width:160px;height:160px;left:8%;top:25%}.circle:nth-child(6){width:260px;height:260px;right:8%;top:60%}.circle:nth-child(7){width:90px;height:90px;left:70%;top:10%}@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-40px)}100%{transform:translateY(0)}}@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(255,255,255,.18),transparent 70%);filter:blur(80px);animation:glowMove 12s ease-in-out infinite alternate;z-index:2}@keyframes glowMove{0%{transform:translate(-50%,-50%) scale(1)}100%{transform:translate(-45%,-55%) scale(1.2)}}#reboot{display:none;font-family:monospace;text-align:left;width:min(420px,90vw);margin:auto;max-height:260px;overflow:hidden;color:#9cff9c;font-size:14px;line-height:1.4}#rebootLoader{display:none}</style></head><body><div class="glow"></div><div id="center"><div id="loader"><div id="loaderText">Loading...</div><div class="progress-bar"><div id="progress"></div></div></div><div id="reboot"></div><div id="rebootLoader"><div id="loaderText">Restarting System...</div><div class="progress-bar"><div id="progress2"></div></div></div><div class="container"><h1>404</h1><h2>Page Not Found</h2><p>Oops! The page you're looking for seems to have disappeared.</p><a class="btn" onclick="startReboot()">Home</a></div></div><div class="circle"></div><div class="circle"></div><div class="circle"></div><script>const circles=document.querySelectorAll(".circle"),progress=document.getElementById("progress");let load=0;const fakeLoad=setInterval(()=>{load+=Math.random()*10;progress.style.width=load+"%";if(load>=100){clearInterval(fakeLoad);setTimeout(()=>{document.getElementById("loader").style.display="none";document.querySelector(".container").style.display="block";circles.forEach(c=>c.classList.add("show"))},300)}},180);function timeStamp(){return"["+String(Math.random()*10).slice(0,5)+"]"}function startReboot(){document.querySelector(".container").style.display="none";circles.forEach(c=>c.classList.remove("show"));const reboot=document.getElementById("reboot");reboot.style.display="block";reboot.innerHTML="";const lines=["Booting Hazarika.in Kernel 6.8.0","Initializing CPU cores","Detecting system memory","Mounting root filesystem","Starting udev device manager","Loading kernel modules","Initializing hardware drivers","Starting system logger","Starting D-Bus system bus","Starting Network Manager","Starting Bluetooth service","Mounting user directories","Checking disk integrity","Starting system services","Initializing graphics subsystem","Starting display manager","Loading user environment","Applying system configuration","Starting background services","System boot complete","Launching user session"];let i=0;function typeLine(){if(i>=lines.length){startRebootLoader();return}let line=document.createElement("div");line.textContent=timeStamp()+" "+lines[i];reboot.appendChild(line);reboot.scrollTop=reboot.scrollHeight;i++;setTimeout(typeLine,320)}typeLine()}function startRebootLoader(){document.getElementById("reboot").style.display="none";const loader=document.getElementById("rebootLoader"),bar=document.getElementById("progress2");loader.style.display="block";let w=0;const rebootLoad=setInterval(()=>{w+=Math.random()*10;bar.style.width=w+"%";if(w>=100){clearInterval(rebootLoad);setTimeout(()=>{loader.style.display="none";bar.style.width="0";document.querySelector(".container").style.display="block";circles.forEach(c=>c.classList.add("show"))},400)}},150)}</script></body></html>
